async function sbFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers || {})
    }
  });
  if (res.status === 204) return [];
  return res.json();
}

async function loadFromSupabase() {
  const data = await sbFetch('/rest/v1/bids?select=*&order=post_date.desc');
  if (!Array.isArray(data) || data.length === 0) {
    await saveAllToSupabase(initialData);
    return initialData.map(b => ({...b}));
  }
  return data.map(row => ({
    id: row.id,
    postDate: row.post_date || '',
    date: row.date || '',
    openDate: row.open_date || '',
    rank: row.rank || '',
    client: row.client || '',
    title: row.title || '',
    amount: row.amount || 0,
    result: row.result || '',
    winner: row.winner || '',
    partners: row.partners || '',
    noticeFiles: row.notice_files ? JSON.parse(row.notice_files) : [],
    taskFiles: row.task_files ? JSON.parse(row.task_files) : []
  }));
}

async function saveAllToSupabase(data) {
  await sbFetch('/rest/v1/bids?id=gte.0', { method: 'DELETE', headers: { 'Prefer': '' } });
  const rows = data.map(b => ({
    id: b.id,
    post_date: b.postDate || '',
    date: b.date || '',
    open_date: b.openDate || '',
    rank: b.rank || '',
    client: b.client || '',
    title: b.title || '',
    amount: b.amount || 0,
    result: b.result || '',
    winner: b.winner || '',
    partners: b.partners || '',
    notice_files: JSON.stringify(b.noticeFiles || []),
    task_files: JSON.stringify(b.taskFiles || [])
  }));
  await sbFetch('/rest/v1/bids', { method: 'POST', body: JSON.stringify(rows) });
}

async function initApp() {
  bids = await loadFromSupabase();
  renderAll();
}

function renderAll() {
  const query = document.getElementById('search').value.toLowerCase();
  const filtered = bids
    .filter(b => b.title.toLowerCase().includes(query) || b.client.toLowerCase().includes(query))
    .sort((a, b) => (b.postDate || '').localeCompare(a.postDate || ''));
  renderTable(filtered);
  renderStats(filtered);
  renderCharts(filtered);
}

const PARTNER_STYLES = {
  '삼안': 'bg-blue-100 text-blue-800 border border-blue-200',
  '한맥': 'bg-emerald-100 text-emerald-800 border border-emerald-200',
  '바론': 'bg-orange-100 text-orange-800 border border-orange-200',
};

function renderPartners(str) {
  if (!str || str === '0') return '<span class="text-slate-300">-</span>';
  const names = str.split(/[:+,\s]+/).map(s => s.trim()).filter(s => s && s !== 'XX');
  return names.map(name => {
    const style = PARTNER_STYLES[name] || 'bg-slate-100 text-slate-600 border border-slate-200';
    return `<span class="inline-block px-1.5 py-0.5 rounded text-[9px] font-bold ${style}">${name}</span>`;
  }).join(' ');
}

function startEditPartners(bidId, td) {
  if (td.querySelector('input')) return;
  const b = bids.find(x => x.id === bidId);
  if (!b) return;
  const current = b.partners && b.partners !== '0' ? b.partners : '';
  td.innerHTML = `
    <div class="flex items-center gap-1">
      <input id="pe_${bidId}" type="text" value="${current}"
        class="border border-blue-300 rounded px-1.5 py-0.5 text-[11px] w-36 focus:outline-none focus:ring-1 focus:ring-blue-400"
        placeholder="삼안:한맥:바론"
        onkeydown="if(event.key==='Enter') savePartners(${bidId}); if(event.key==='Escape') renderAll();"
      />
      <button onclick="savePartners(${bidId})" class="text-[9px] bg-blue-500 text-white rounded px-1.5 py-0.5 hover:bg-blue-600">저장</button>
      <button onclick="renderAll()" class="text-[9px] bg-slate-200 text-slate-600 rounded px-1.5 py-0.5 hover:bg-slate-300">취소</button>
    </div>`;
  td.querySelector('input').focus();
}

async function savePartners(bidId) {
  const input = document.getElementById('pe_' + bidId);
  if (!input) return;
  const b = bids.find(x => x.id === bidId);
  if (!b) return;
  b.partners = input.value.trim() || '0';
  await saveAllToSupabase(bids);
  renderAll();
}

// ✅ 핵심 수정: reader.onload를 async로 선언
function triggerUpload(bidId, type) {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = '.pdf,.hwp,.hwpx,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png';
  input.onchange = () => {
    const files = Array.from(input.files);
    if (!files.length) return;
    let done = 0;
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = async (e) => {  // ✅ async 추가
        const b = bids.find(x => x.id === bidId);
        if (!b) return;
        const fileObj = { name: file.name, data: e.target.result, mime: file.type };
        if (type === 'notice') b.noticeFiles = [...(b.noticeFiles || []), fileObj];
        else b.taskFiles = [...(b.taskFiles || []), fileObj];
        done++;
        if (done === files.length) {
          await saveAllToSupabase(bids);
          renderAll();
        }
      };
      reader.readAsDataURL(file);
    });
  };
  input.click();
}

function downloadFile(bidId, type, idx) {
  const b = bids.find(x => x.id === bidId);
  if (!b) return;
  const f = (type === 'notice' ? b.noticeFiles : b.taskFiles)[idx];
  if (!f) return;
  if (typeof f === 'string') { alert('이전 방식으로 저장된 파일명: ' + f); return; }
  const a = document.createElement('a');
  a.href = f.data;
  a.download = f.name;
  a.click();
}

async function removeFile(bidId, type, idx) {
  const b = bids.find(x => x.id === bidId);
  if (!b) return;
  if (type === 'notice') b.noticeFiles.splice(idx, 1);
  else b.taskFiles.splice(idx, 1);
  await saveAllToSupabase(bids);
  renderAll();
}

function getFileName(f) { return typeof f === 'string' ? f : f.name; }

function renderFilePanel(b) {
  const nf = b.noticeFiles || [];
  const tf = b.taskFiles || [];
  const renderRow = (f, i, type, color, label) => `
    <div class="flex items-center gap-1 group min-w-0">
      <span class="text-[9px] font-bold ${color === 'blue' ? 'text-blue-500 bg-blue-50' : 'text-violet-500 bg-violet-50'} px-1 rounded flex-shrink-0">${label}</span>
      <button onclick="downloadFile(${b.id},'${type}',${i})" class="text-[9px] text-slate-600 hover:text-blue-600 hover:underline truncate max-w-[110px] text-left" title="${getFileName(f)}">${getFileName(f)}</button>
      <button onclick="removeFile(${b.id},'${type}',${i})" class="hidden group-hover:inline flex-shrink-0 text-red-400 hover:text-red-600 text-[10px] leading-none ml-auto">✕</button>
    </div>`;
  return `
    <div class="flex flex-col gap-0.5 min-w-0">
      ${nf.map((f, i) => renderRow(f, i, 'notice', 'blue', '공고')).join('')}
      ${tf.map((f, i) => renderRow(f, i, 'task', 'violet', '과업')).join('')}
      ${nf.length === 0 && tf.length === 0 ? '<span class="text-[9px] text-slate-300">없음</span>' : ''}
      <div class="flex gap-1 mt-0.5">
        <button onclick="triggerUpload(${b.id},'notice')" class="text-[9px] text-blue-400 hover:text-blue-600 font-bold border border-blue-200 rounded px-1.5 py-0.5 bg-blue-50">↑공고</button>
        <button onclick="triggerUpload(${b.id},'task')" class="text-[9px] text-violet-400 hover:text-violet-600 font-bold border border-violet-200 rounded px-1.5 py-0.5 bg-violet-50">↑과업</button>
      </div>
    </div>`;
}

function inlineEdit(bidId, field, td, opts = {}) {
  if (td.querySelector('input,select,textarea')) return;
  const b = bids.find(x => x.id === bidId);
  if (!b) return;
  const val = b[field] !== undefined ? b[field] : '';
  let input;
  if (opts.type === 'select') {
    input = document.createElement('select');
    input.className = 'border border-blue-300 rounded px-1 py-0.5 text-[11px] focus:outline-none focus:ring-1 focus:ring-blue-400 bg-white';
    opts.options.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      if (String(val) === o) opt.selected = true;
      input.appendChild(opt);
    });
  } else {
    input = document.createElement('input');
    input.type = opts.number ? 'number' : 'text';
    input.value = val;
    input.className = 'border border-blue-300 rounded px-1.5 py-0.5 text-[11px] focus:outline-none focus:ring-1 focus:ring-blue-400 ' + (opts.wide ? 'w-48' : 'w-24');
    input.placeholder = opts.placeholder || '';
  }
  const save = async () => {
    let newVal = opts.number ? Number(input.value) : input.value.trim();
    if (field === 'partners' && (!newVal || newVal === '')) newVal = '0';
    b[field] = newVal;
    await saveAllToSupabase(bids);
    renderAll();
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') save();
    if (e.key === 'Escape') renderAll();
  });
  if (opts.type === 'select') input.addEventListener('change', save);
  const wrap = document.createElement('div');
  wrap.className = 'flex items-center gap-1';
  wrap.appendChild(input);
  if (opts.type !== 'select') {
    const btnSave = document.createElement('button');
    btnSave.textContent = '✓';
    btnSave.className = 'text-[10px] bg-blue-500 text-white rounded px-1 py-0.5 hover:bg-blue-600 leading-none';
    btnSave.onclick = save;
    const btnCancel = document.createElement('button');
    btnCancel.textContent = '✕';
    btnCancel.className = 'text-[10px] bg-slate-200 text-slate-600 rounded px-1 py-0.5 hover:bg-slate-300 leading-none';
    btnCancel.onclick = () => renderAll();
    wrap.appendChild(btnSave);
    wrap.appendChild(btnCancel);
  }
  td.innerHTML = '';
  td.appendChild(wrap);
  input.focus();
  if (input.select) input.select();
}

const EDITABLE = 'cursor-pointer group hover:bg-blue-50 transition-colors';
const EDIT_ICON = `<span class="hidden group-hover:inline text-[9px] text-blue-300 ml-1">✏</span>`;

        <td class="px-3 py-3 font-bold text-slate-500 text-[11px] ${EDITABLE}" onclick="inlineEdit(${id},'rank',this,{placeholder:'순위',wide:false})">${b.rank}${EDIT_ICON}</td>

        <td class="px-3 py-3 ${EDITABLE}" onclick="inlineEdit(${id},'result',this,{type:'select',options:['진행중','낙찰','타사낙찰','불참','-']})">
          <span class="px-2 py-0.5 rounded-full font-bold text-[11px] ${getBadge(b.result)}">${b.result === '-' || !b.result ? '진행중' : b.result}</span>${EDIT_ICON}

function getBadge(res) {
  if (res === '낙찰') return 'bg-green-100 text-green-700';
  if (res === '타사낙찰') return 'bg-red-100 text-red-700';
  if (res === '불참') return 'bg-amber-100 text-amber-700';
  return 'bg-blue-100 text-blue-700';
}

function renderStats(data) {
  const totalAmt = data.reduce((sum, b) => sum + b.amount, 0);
  document.getElementById('total-amount').innerText = (totalAmt / 100000000).toFixed(2) + '억 원';
  document.getElementById('total-count').innerText = data.length + '건';
  document.getElementById('lose-count').innerText = data.filter(b => b.result === '타사낙찰').length + '건';
  document.getElementById('skip-count').innerText = data.filter(b => b.result === '불참').length + '건';
}

function getResultCounts(data, partner) {
  const filtered = data.filter(b => {
    if (!b.partners || b.partners === '0') return false;
    const first = b.partners.split(/[:+,\s]+/).map(s => s.trim()).filter(s => s && s !== 'XX')[0];
    return first === partner;
  });
  const order = ['낙찰', '타사낙찰', '불참', '진행중'];
  const colorMap = { '낙찰': '#10b981', '타사낙찰': '#ef4444', '불참': '#f59e0b', '진행중': '#3b82f6' };
  const counts = {};
  filtered.forEach(b => {
    const r = (!b.result || b.result === '-') ? '진행중' : b.result;
    counts[r] = (counts[r] || 0) + 1;
  });
  const labels = order.filter(k => counts[k]);
  return {
    labels,
    datasets: [{ data: labels.map(k => counts[k]), backgroundColor: labels.map(k => colorMap[k] || '#94a3b8'), borderWidth: 2, borderColor: '#fff' }],
    total: filtered.length
  };
}

function makeDoughnut(canvasId, chartData, color) {
  return new Chart(document.getElementById(canvasId), {
    type: 'doughnut',
    data: chartData,
    options: {
      maintainAspectRatio: false,
      cutout: '45%',
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 }, padding: 8 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw}건` } }
      }
    },
    plugins: [{
      id: 'centerText',
      afterDraw(chart) {
        const { ctx, chartArea: { width, height, left, top } } = chart;
        ctx.save();
        ctx.font = 'bold 20px Pretendard, sans-serif';
        ctx.fillStyle = color;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(chartData.total + '건', left + width / 2, top + height / 2 - 6);
        ctx.font = '10px Pretendard, sans-serif';
        ctx.fillStyle = '#94a3b8';
        ctx.fillText('참여', left + width / 2, top + height / 2 + 12);
        ctx.restore();
      }
    }]
  });
}

function renderCharts(data) {
  if (samanChart) samanChart.destroy();
  if (hanmaekChart) hanmaekChart.destroy();
  samanChart = makeDoughnut('samanChart', getResultCounts(data, '삼안'), '#3b82f6');
  hanmaekChart = makeDoughnut('hanmaekChart', getResultCounts(data, '한맥'), '#10b981');
}

// 모달 파일 관리
let _modalFiles = { notice: [], task: [] };

function handleModalUpload(event, containerId) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  const type = containerId === 'notice-files' ? 'notice' : 'task';
  let done = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      _modalFiles[type].push({ name: file.name, data: e.target.result, mime: file.type });
      done++;
      if (done === files.length) renderModalFileList(containerId, type);
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderModalFileList(containerId, type) {
  const container = document.getElementById(containerId);
  container.innerHTML = _modalFiles[type].map((f, i) => `
    <div class="flex items-center gap-1.5 group">
      <span class="text-[11px] text-slate-600 truncate flex-1">${f.name}</span>
      <button type="button" onclick="removeModalFile('${type}',${i})" class="text-red-400 hover:text-red-600 text-xs font-bold">✕</button>
    </div>`).join('');
}

function removeModalFile(type, idx) {
  _modalFiles[type].splice(idx, 1);
  renderModalFileList(type === 'notice' ? 'notice-files' : 'task-files', type);
}

function loadFileList(containerId, files = []) {
  const type = containerId === 'notice-files' ? 'notice' : 'task';
  _modalFiles[type] = files.map(f => typeof f === 'string' ? { name: f, data: null, mime: '' } : f);
  renderModalFileList(containerId, type);
}

function openModal(id = null) {
  _modalFiles = { notice: [], task: [] };
  document.getElementById('modal').classList.remove('hidden');
  if (id) {
    const b = bids.find(x => x.id === id);
    document.getElementById('edit-id').value = b.id;
    document.getElementById('m_post_date').value = b.postDate;
    document.getElementById('m_date').value = b.date;
    document.getElementById('m_open_date').value = b.openDate;
    document.getElementById('m_rank').value = b.rank;
    document.getElementById('m_client').value = b.client;
    document.getElementById('m_title').value = b.title;
    document.getElementById('m_amount').value = b.amount;
    document.getElementById('m_result').value = b.result;
    document.getElementById('m_winner').value = b.winner;
    document.getElementById('m_partners').value = b.partners;
    loadFileList('notice-files', b.noticeFiles || []);
    loadFileList('task-files', b.taskFiles || []);
  } else {
    ['edit-id','m_post_date','m_date','m_open_date','m_rank','m_client','m_title','m_amount','m_result','m_winner','m_partners'].forEach(id => {
      document.getElementById(id).value = '';
    });
    loadFileList('notice-files', []);
    loadFileList('task-files', []);
  }
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

async function submitForm() {
  const id = document.getElementById('edit-id').value;
  const newData = {
    id: id ? parseInt(id) : Date.now(),
    postDate: document.getElementById('m_post_date').value,
    date: document.getElementById('m_date').value,
    openDate: document.getElementById('m_open_date').value,
    rank: document.getElementById('m_rank').value,
    client: document.getElementById('m_client').value,
    title: document.getElementById('m_title').value,
    amount: parseInt(document.getElementById('m_amount').value) || 0,
    result: document.getElementById('m_result').value,
    winner: document.getElementById('m_winner').value,
    partners: document.getElementById('m_partners').value,
    noticeFiles: _modalFiles.notice,
    taskFiles: _modalFiles.task
  };
  if (id) bids[bids.findIndex(x => x.id === parseInt(id))] = newData;
  else bids.unshift(newData);
  await saveAllToSupabase(bids);
  renderAll();
  closeModal();
}

async function deleteBid(id) {
  if (confirm('삭제?')) {
    bids = bids.filter(x => x.id !== id);
    await saveAllToSupabase(bids);
    renderAll();
  }
}

window.onload = initApp;
</script>
