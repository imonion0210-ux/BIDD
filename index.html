
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바론 입찰관리 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}

/* Header */
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:10px}
.logo-badge{background:#1d4ed8;color:#fff;font-size:11px;font-weight:800;padding:4px 10px;border-radius:8px;letter-spacing:.5px}
.logo h1{font-size:15px;font-weight:700;color:#0f172a}
.header-actions{display:flex;align-items:center;gap:10px}
.conn-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#cbd5e1}
.conn-dot.ok{background:#10b981;animation:none}
.conn-dot.err{background:#ef4444;animation:none}
.conn-dot.loading{background:#f59e0b;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{padding:7px 16px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:#1d4ed8;color:#fff}
.btn-primary:hover{background:#1e40af}
.btn-green{background:#059669;color:#fff}
.btn-green:hover{background:#047857}

/* Main */
main{max-width:1800px;margin:0 auto;padding:24px 28px;display:flex;flex-direction:column;gap:20px}

/* Summary Cards */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{background:#fff;border-radius:16px;padding:20px 22px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.04);display:flex;flex-direction:column;gap:8px}
.card-label{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.5px;text-transform:uppercase}
.card-value{font-size:26px;font-weight:900;line-height:1.1}
.card-sub{font-size:11px;color:#94a3b8;font-weight:500}

/* Card 1 - 지분액 */
.card-amount .card-value{color:#1d4ed8}
/* Card 2 - 참여 */
.card-join .card-value{color:#0f172a}
.result-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill-blue{background:#dbeafe;color:#1d4ed8}
.pill-amber{background:#fef3c7;color:#b45309}
.pill-green{background:#d1fae5;color:#065f46}
.pill-red{background:#fee2e2;color:#b91c1c}

/* Card 3 - 낙찰 (강조) */
.card-win{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%);border-color:#1e3a8a}
.card-win .card-label{color:#93c5fd}
.card-win .card-value{color:#fff;font-size:40px}
.card-win .card-sub{color:#93c5fd}
.win-list{margin-top:6px;display:flex;flex-direction:column;gap:4px;max-height:80px;overflow-y:auto}
.win-item{font-size:10px;color:#bfdbfe;background:rgba(255,255,255,.08);padding:4px 8px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Card 3 - 낙찰 (강조) */
.card-win{background:linear-gradient(135deg,#1e40af 0%,#3b82f6 100%);border-color:#3b82f6}
.card-win .card-label{color:#bfdbfe}
.card-win .card-value{color:#fff;font-size:40px}
.card-win .card-sub{color:#bfdbfe}
.win-list{margin-top:6px;display:flex;flex-direction:column;gap:4px;max-height:80px;overflow-y:auto}
.win-item{font-size:10px;color:#dbeafe;background:rgba(255,255,255,.15);padding:4px 8px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Card 4 - 낙찰률 */
.card-rate .card-value{color:#059669}
.rate-bar-wrap{background:#e2e8f0;border-radius:10px;height:6px;overflow:hidden;margin-top:4px}
.rate-bar{background:linear-gradient(90deg,#10b981,#059669);height:100%;border-radius:10px;transition:width .6s ease}

/* Charts */
.charts-row{display:grid;grid-template-columns:1fr 1fr 1.6fr;gap:16px}
.chart-card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.chart-title{font-size:12px;font-weight:700;color:#475569;margin-bottom:12px}
.chart-wrap{position:relative;height:180px}

/* Filter tabs */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;color:#64748b;transition:all .15s}
.tab.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}

/* Table */
.table-card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.table-header{padding:14px 20px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;gap:12px;background:#fafafa;flex-wrap:wrap;gap:8px}
.table-header h3{font-size:14px;font-weight:700;color:#0f172a}
.search-wrap{display:flex;align-items:center;gap:8px}
.search-input{border:1.5px solid #e2e8f0;border-radius:10px;padding:7px 14px;font-size:12px;outline:none;width:260px;font-family:inherit;color:#0f172a}
.search-input:focus{border-color:#93c5fd}
.table-scroll{overflow-x:auto;max-height:560px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
thead{position:sticky;top:0;z-index:10}
th{background:#f8fafc;padding:10px 14px;font-weight:700;color:#64748b;white-space:nowrap;border-bottom:1px solid #e2e8f0;text-align:left}
td{padding:10px 14px;border-bottom:1px solid #f8fafc;vertical-align:middle}
tr:hover td{background:#f8fafc}
.mono{font-family:monospace;color:#94a3b8}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-green{background:#d1fae5;color:#065f46}
.badge-red{background:#fee2e2;color:#b91c1c}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f1f5f9;color:#64748b}
.partner-tag{display:inline-block;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700;margin:1px}
.pt-삼안{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.pt-한맥{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.pt-바론{background:#ffedd5;color:#c2410c;border:1px solid #fed7aa}
.pt-other{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.edit-cell{cursor:pointer}
.edit-cell:hover{background:#eff6ff}
.edit-icon{display:none;font-size:9px;color:#93c5fd;margin-left:3px}
.edit-cell:hover .edit-icon{display:inline}
.inline-input{border:1.5px solid #93c5fd;border-radius:6px;padding:2px 6px;font-size:11px;outline:none;font-family:inherit;background:#fff}
.inline-input:focus{border-color:#3b82f6}
.btn-save-sm{background:#3b82f6;color:#fff;border:none;border-radius:5px;padding:2px 7px;font-size:9px;font-weight:700;cursor:pointer}
.btn-cancel-sm{background:#e2e8f0;color:#475569;border:none;border-radius:5px;padding:2px 7px;font-size:9px;font-weight:700;cursor:pointer}
.btn-del{background:none;border:none;color:#fca5a5;font-size:11px;font-weight:700;cursor:pointer;padding:2px 6px;border-radius:5px}
.btn-del:hover{color:#ef4444;background:#fee2e2}
.file-panel{display:flex;flex-direction:column;gap:2px}
.file-row{display:flex;align-items:center;gap:4px}
.file-label{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px}
.fl-공고{background:#dbeafe;color:#1d4ed8}
.fl-과업{background:#ede9fe;color:#6d28d9}
.file-btn{background:none;border:none;font-size:9px;color:#475569;cursor:pointer;text-align:left;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-btn:hover{color:#1d4ed8;text-decoration:underline}
.file-del{background:none;border:none;color:#fca5a5;cursor:pointer;font-size:9px;display:none}
.file-row:hover .file-del{display:inline}
.upload-row{display:flex;gap:4px;margin-top:2px}
.upload-btn{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;cursor:pointer;border:1px solid}
.upload-btn-notice{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.upload-btn-task{background:#f5f3ff;color:#6d28d9;border-color:#ddd6fe}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:28px 32px}
.modal h3{font-size:18px;font-weight:800;color:#0f172a;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-full{grid-column:1/-1}
label.form-label{display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:4px;letter-spacing:.5px}
.form-input{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;color:#0f172a}
.form-input:focus{border-color:#93c5fd}
.form-select{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;color:#0f172a;background:#fff}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.btn-modal-cancel{flex:1;padding:12px;border-radius:12px;background:#f1f5f9;color:#475569;font-weight:700;border:none;cursor:pointer;font-size:14px}
.btn-modal-save{flex:2;padding:12px;border-radius:12px;background:#1d4ed8;color:#fff;font-weight:700;border:none;cursor:pointer;font-size:14px}
.file-section{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin-top:4px}
.file-section h4{font-size:11px;font-weight:700;color:#64748b;margin-bottom:10px}
.file-boxes{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.file-box{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px}
.file-box-title{font-size:10px;font-weight:700;margin-bottom:6px}
.file-box-title.notice{color:#1d4ed8}
.file-box-title.task{color:#6d28d9}

/* Banner */
#banner{position:fixed;bottom:20px;right:20px;z-index:9999;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;opacity:0;pointer-events:none;transition:opacity .4s;box-shadow:0 2px 12px rgba(0,0,0,.2);font-family:inherit}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">BARON</span>
    <h1>공공측량업 입찰관리 대시보드</h1>
  </div>
  <div class="header-actions">
    <div class="conn-badge" id="connBadge">
      <span class="conn-dot loading" id="connDot"></span>
      <span id="connText">연결 확인 중...</span>
    </div>
    <button class="btn btn-green" onclick="window.open('https://www.g2b.go.kr','_blank')">
      ↗ 나라장터
    </button>
    <button class="btn btn-primary" onclick="openModal()">+ 신규 입찰 등록</button>
  </div>
</header>

<main>
  <!-- Summary Cards -->
  <div class="cards">
    <!-- Card 1: 총 지분액 -->
    <div class="card card-amount">
      <div class="card-label">총 참여 지분액</div>
      <div class="card-value" id="cardAmount">0억</div>
      <div class="card-sub" id="cardAmountSub">—</div>
    </div>
    <!-- Card 2: 참여 건수 -->
    <div class="card card-join">
      <div class="card-label">참여 건수</div>
      <div class="card-value" id="cardJoin">0건</div>
      <div class="result-pills" id="cardJoinPills"></div>
    </div>
    <!-- Card 3: 낙찰 (강조) -->
    <div class="card card-win">
      <div class="card-label">🏆 낙찰 건수</div>
      <div class="card-value" id="cardWin">0</div>
      <div class="win-list" id="cardWinList"></div>
    </div>
    <!-- Card 4: 낙찰률 -->
    <div class="card card-rate">
      <div class="card-label">낙찰률</div>
      <div class="card-value" id="cardRate">0%</div>
      <div class="rate-bar-wrap"><div class="rate-bar" id="rateBar" style="width:0%"></div></div>
      <div class="card-sub" id="cardRateSub">낙찰 0 / 결과확정 0건</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">🔵 삼안 참여 결과</div>
      <div class="chart-wrap"><canvas id="samanChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🟢 한맥 참여 결과</div>
      <div class="chart-wrap"><canvas id="hanmaekChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">📅 월별 참여 건수</div>
      <div class="chart-wrap"><canvas id="monthChart"></canvas></div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-header">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <h3>입찰 참여 상세 내역</h3>
        <div class="filter-tabs" id="filterTabs">
          <button class="tab active" onclick="setFilter('all',this)">전체</button>
          <button class="tab" onclick="setFilter('진행중',this)">진행중</button>
          <button class="tab" onclick="setFilter('낙찰',this)">낙찰</button>
          <button class="tab" onclick="setFilter('타사낙찰',this)">타사낙찰</button>
          <button class="tab" onclick="setFilter('불참',this)">불참</button>
        </div>
      </div>
      <input class="search-input" id="searchInput" placeholder="용역명, 발주처 검색..." oninput="renderAll()">
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>공고일</th><th>마감일</th><th>개찰일시</th><th>순위</th>
            <th>발주처</th><th style="min-width:200px">용역명</th>
            <th>지분금액</th><th>결과</th><th>낙찰사</th>
            <th>참여사</th><th>첨부파일</th><th style="text-align:center">관리</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">신규 입찰 등록</h3>
    <input type="hidden" id="mId">
    <div class="form-grid">
      <div><label class="form-label">공고일</label><input class="form-input" id="mPostDate" placeholder="YYYY-MM-DD"></div>
      <div><label class="form-label">등록마감일</label><input class="form-input" id="mDate" placeholder="YYYY-MM-DD"></div>
      <div><label class="form-label">개찰일시</label><input class="form-input" id="mOpenDate" placeholder="개찰일시"></div>
      <div><label class="form-label">순위</label><input class="form-input" id="mRank" placeholder="예: 3위"></div>
      <div class="form-full"><label class="form-label">발주처</label><input class="form-input" id="mClient"></div>
      <div class="form-full"><label class="form-label">용역명</label><input class="form-input" id="mTitle"></div>
      <div><label class="form-label">지분금액 (원)</label><input class="form-input" id="mAmount" type="number"></div>
      <div><label class="form-label">결과</label>
        <select class="form-select" id="mResult">
          <option value="-">진행중</option>
          <option value="낙찰">낙찰</option>
          <option value="당사낙찰">당사낙찰</option>
          <option value="타사낙찰">타사낙찰</option>
          <option value="불참">불참</option>
        </select>
      </div>
      <div><label class="form-label">낙찰사</label><input class="form-input" id="mWinner" placeholder="-"></div>
      <div><label class="form-label">참여사 구성</label><input class="form-input" id="mPartners" placeholder="삼안:한맥:바론"></div>
      <div class="form-full">
        <div class="file-section">
          <h4>첨부 파일</h4>
          <div class="file-boxes">
            <div class="file-box">
              <div class="file-box-title notice">공고문</div>
              <div id="mNoticeFiles"></div>
              <label style="font-size:10px;color:#1d4ed8;cursor:pointer;font-weight:700">
                ↑ 파일 추가
                <input type="file" multiple style="display:none" onchange="handleModalFile(event,'notice')">
              </label>
            </div>
            <div class="file-box">
              <div class="file-box-title task">과업지시서</div>
              <div id="mTaskFiles"></div>
              <label style="font-size:10px;color:#6d28d9;cursor:pointer;font-weight:700">
                ↑ 파일 추가
                <input type="file" multiple style="display:none" onchange="handleModalFile(event,'task')">
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal()">취소</button>
      <button class="btn-modal-save" onclick="submitForm()">저장</button>
    </div>
  </div>
</div>

<div id="banner"></div>

const SB_URL = 'https://peawevlcywmaadvigoug.supabase.co';

// ── Supabase helpers ──
async function sbFetch(path, opts={}) {
  const res = await fetch(SB_URL + path, {
    ...opts,
    headers: {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})}
  });
  if (res.status===204) return [];
  const t = await res.text();
  return t ? JSON.parse(t) : [];
}
function parse(r) {
  return {id:r.id,postDate:r.post_date||'',date:r.date||'',openDate:r.open_date||'',rank:r.rank||'',client:r.client||'',title:r.title||'',amount:r.amount||0,result:r.result||'-',winner:r.winner||'-',partners:r.partners||'',noticeFiles:r.notice_files?JSON.parse(r.notice_files):[],taskFiles:r.task_files?JSON.parse(r.task_files):[]};
}

// ── Google Sheets 연동 ──
const SHEET_ID = '1_zwovmYYRPwQqOG79wLu0OSVn0XaeHur_Fyh92IY3E4';
const SHEET_GID = '465680672';

async function loadFromSheets() {
  // 구글 시트 공개 JSON API (CORS 우회 가능)
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;
  const res = await fetch(url);
  const text = await res.text();
  // 구글이 반환하는 형식: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const cols = json.table.cols;
  const rowsRaw = json.table.rows;

  // 2행이 헤더 (index 1), 3행부터 데이터 (index 2~)
  // cols[i].label 은 구글이 인식한 헤더인데 1행 기준일 수 있어서
  // 직접 rowsRaw[1] (2번째 행) 을 헤더로 사용
  const headerRow = rowsRaw[1].c.map(c => c ? (c.v || '').toString().trim() : '');

  const get = (row, name) => {
    const idx = headerRow.findIndex(h => h.includes(name));
    if (idx < 0) return '';
    const cell = row.c[idx];
    return cell && cell.v != null ? cell.v.toString().trim() : '';
  };

  const rows = [];
  for (let i = 2; i < rowsRaw.length; i++) {
    const row = rowsRaw[i];
    if (!row || !row.c) continue;
    const title = get(row, '용역명');
    if (!title) continue; // 빈 행 건너뜀
    rows.push({
      id: i,
      postDate:  get(row, '공고일'),
      date:      get(row, '등록마감일'),
      openDate:  get(row, '개찰일시'),
      client:    get(row, '발주처'),
      title,
      amount:    parseInt((get(row, '바론지분금액') || '0').replace(/[^0-9]/g,'')) || 0,
      result:    get(row, '낙찰결과') || '-',
      winner:    '-',
      rank:      get(row, '개찰순위') || '-',
      partners:  get(row, '참여사'),
      noticeFiles: [],
      taskFiles: []
    });
  }
  return rows;
}

async function loadData() {
  const cache = loadCache();
  // 1. 구글 시트에서 먼저 불러오기
  try {
    const sheetData = await loadFromSheets();
    if (sheetData && sheetData.length > 0) {
      showBanner('📊 구글 시트에서 불러옴', '#059669');
      saveCache(sheetData);
      return sheetData;
    }
  } catch(e) {
    console.warn('구글 시트 로드 실패, Supabase 시도', e);
  }
  // 2. 구글 시트 실패 시 Supabase fallback
  try {
    const data = await sbFetch('/rest/v1/bids?select=*&order=post_date.desc');
    if (!Array.isArray(data)||data.length===0) {
      if (cache&&cache.length>0){showBanner('⏫ 로컬 데이터 복원 중...','#1d4ed8');await saveAll(cache);return cache;}
      await saveAll(INIT);return INIT.map(b=>({...b}));
    }
    const fromSv = data.map(parse);
    saveCache(fromSv);return fromSv;
  } catch(e) {
    showBanner('⚠️ 오프라인 — 로컬 데이터 표시','#b45309');
    return cache&&cache.length>0?cache:INIT.map(b=>({...b}));
  }
}

async function saveAll(data) {
  saveCache(data);
  showBanner('✓ 저장됨','#059669');
  try {
    const rows = data.map(b=>({id:b.id,post_date:b.postDate||'',date:b.date||'',open_date:b.openDate||'',rank:b.rank||'',client:b.client||'',title:b.title||'',amount:b.amount||0,result:b.result||'-',winner:b.winner||'-',partners:b.partners||''}));
    await sbFetch('/rest/v1/bids',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(rows)});
    const wf = data.filter(b=>(b.noticeFiles||[]).length>0||(b.taskFiles||[]).length>0);
    for(const b of wf){
      await sbFetch('/rest/v1/bids?id=eq.'+b.id,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({notice_files:JSON.stringify(b.noticeFiles||[]),task_files:JSON.stringify(b.taskFiles||[])})});
    }
    try{
      const remIds=(await sbFetch('/rest/v1/bids?select=id')).map(r=>r.id);
      const locIds=new Set(data.map(b=>b.id));
      for(const rid of remIds){if(!locIds.has(rid)){await sbFetch('/rest/v1/bids?id=eq.'+rid,{method:'DELETE',headers:{'Prefer':''}});}}
    }catch(e2){}
  } catch(e){showBanner('⚠️ 서버 저장 실패 (로컬 저장됨)','#b45309');}
}

async function uploadFile(bidId, type, file) {
  try {
    const path = `${bidId}/${type}/${Date.now()}_${file.name}`;
    const res = await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${path}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},body:file});
    if(res.ok) return {name:file.name,path,mime:file.type};
  } catch(e){}
  return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve({name:file.name,data:r.result,mime:file.type});r.onerror=()=>reject();r.readAsDataURL(file);});
}

function getFileUrl(f){return f.path?`${SB_URL}/storage/v1/object/public/${BUCKET}/${f.path}`:f.data||null;}
function getFileName(f){return typeof f==='string'?f:f.name;}

// ── Filter ──
function setFilter(f, el){
  activeFilter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderAll();

// ── Render ──
function renderAll(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let data=[...bids];
  if(q) data=data.filter(b=>b.title.toLowerCase().includes(q)||b.client.toLowerCase().includes(q));
  if(activeFilter!=='all'){
    data=data.filter(b=>{
      const r=b.result||'-';
      if(activeFilter==='진행중') return r==='-'||r==='';
      if(activeFilter==='낙찰') return r==='낙찰'||r==='당사낙찰';
      return r===activeFilter;
    });
  }
  data.sort((a,b)=>(b.postDate||'').localeCompare(a.postDate||''));
  renderCards(data);
  renderCharts(data);
  renderTable(data);
}

function normalRes(r){if(!r||r==='-'||r==='')return '진행중';if(r==='당사낙찰')return '낙찰';return r;}

function renderCards(data){
  // Card 1
  const total=data.reduce((s,b)=>s+b.amount,0);
  document.getElementById('cardAmount').textContent=(total/1e8).toFixed(2)+'억 원';
  document.getElementById('cardAmountSub').textContent=`${data.length}건 합산`;

  // Card 2
  document.getElementById('cardJoin').textContent=data.length+'건';
  const cats=[
    {keys:['진행중','','-'],label:'진행중',cls:'pill-blue'},
    {keys:['낙찰','당사낙찰'],label:'낙찰',cls:'pill-green'},
    {keys:['타사낙찰'],label:'타사낙찰',cls:'pill-red'},
    {keys:['불참'],label:'불참',cls:'pill-amber'},
  ];
  document.getElementById('cardJoinPills').innerHTML=cats.map(c=>{
    const cnt=data.filter(b=>c.keys.includes(normalRes(b.result)||'진행중')||c.keys.includes(b.result||'-')).length;
    return cnt?`<span class="pill ${c.cls}">${c.label} ${cnt}</span>`:'';
  }).join('');

  // Card 3
  const wins=data.filter(b=>b.result==='낙찰'||b.result==='당사낙찰');
  document.getElementById('cardWin').textContent=wins.length;
  document.getElementById('cardWinList').innerHTML=wins.length
    ?wins.map(b=>`<div class="win-item" title="${b.title}">📌 ${b.title}</div>`).join('')
    :'<div class="win-item">낙찰 건 없음</div>';

  // Card 4
  const decided=data.filter(b=>b.result==='낙찰'||b.result==='당사낙찰'||b.result==='타사낙찰');
  const rate=decided.length?Math.round((wins.length/decided.length)*100):0;
  document.getElementById('cardRate').textContent=rate+'%';
  document.getElementById('rateBar').style.width=rate+'%';
  document.getElementById('cardRateSub').textContent=`낙찰 ${wins.length} / 결과확정 ${decided.length}건`;
}

function getResultCounts(data,partner){
  const f=data.filter(b=>{
    if(!b.partners||b.partners==='0') return false;
    const first=b.partners.split(/[:+,\s]+/).map(s=>s.trim()).filter(s=>s&&s!=='XX')[0];
    return first===partner;
  });
  const colorMap={'낙찰':'#10b981','타사낙찰':'#ef4444','불참':'#f59e0b','진행중':'#3b82f6'};
  const counts={};
  f.forEach(b=>{let r=normalRes(b.result);counts[r]=(counts[r]||0)+1;});
  const labels=Object.keys(counts);
  return {labels,datasets:[{data:labels.map(k=>counts[k]),backgroundColor:labels.map(k=>colorMap[k]||'#94a3b8'),borderWidth:2,borderColor:'#fff'}],total:f.length};
}

function makeDoughnut(id,chartData,color){
  return new Chart(document.getElementById(id),{
    type:'doughnut',data:chartData,
    options:{maintainAspectRatio:false,cutout:'50%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10},padding:8}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw}건`}}}},
    plugins:[{id:'ct',afterDraw(c){
      const{ctx,chartArea:{width,height,left,top}}=c;
      ctx.save();ctx.font='bold 22px Pretendard,sans-serif';ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(chartData.total+'건',left+width/2,top+height/2-6);
      ctx.font='10px Pretendard,sans-serif';ctx.fillStyle='#94a3b8';ctx.fillText('참여',left+width/2,top+height/2+12);ctx.restore();
    }}]
  });
}

function makeBar(id,data){
  const months={};
  data.forEach(b=>{if(!b.postDate) return;const m=b.postDate.slice(0,7);months[m]=(months[m]||0)+1;});
  const labels=Object.keys(months).sort();
  return new Chart(document.getElementById(id),{
    type:'bar',
    data:{labels:labels.map(l=>l.slice(5)+'월'),datasets:[{label:'참여 건수',data:labels.map(l=>months[l]),backgroundColor:'#bfdbfe',borderRadius:6}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw}건`}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}},grid:{color:'#f1f5f9'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}
  });
}

function renderCharts(data){
  if(samanCh){samanCh.destroy();}
  if(hanmaekCh){hanmaekCh.destroy();}
  if(monthCh){monthCh.destroy();}
  samanCh=makeDoughnut('samanChart',getResultCounts(data,'삼안'),'#3b82f6');
  hanmaekCh=makeDoughnut('hanmaekChart',getResultCounts(data,'한맥'),'#10b981');
  monthCh=makeBar('monthChart',data);
}

function getBadge(r){
  const n=normalRes(r);
  if(n==='낙찰') return 'badge-green';
  if(n==='타사낙찰') return 'badge-red';
  if(n==='불참') return 'badge-amber';
  return 'badge-blue';
}

function renderPartners(str){
  if(!str||str==='0') return '<span style="color:#cbd5e1">-</span>';
  return str.split(/[:+,\s]+/).map(s=>s.trim()).filter(s=>s&&s!=='XX').map(n=>{
    const cls=n==='삼안'?'pt-삼안':n==='한맥'?'pt-한맥':n==='바론'?'pt-바론':'pt-other';
    return `<span class="partner-tag ${cls}">${n}</span>`;
  }).join('');
}

function renderFilePanel(b){
  const rows=f=>(arr,type)=>arr.map((f,i)=>`<div class="file-row"><span class="file-label fl-${type==='notice'?'공고':'과업'}">${type==='notice'?'공고':'과업'}</span><button class="file-btn" onclick="dlFile(${b.id},'${type}',${i})" title="${getFileName(f)}">${getFileName(f)}</button><button class="file-del" onclick="rmFile(${b.id},'${type}',${i})">✕</button></div>`).join('');
  return `<div class="file-panel">${rows(null,'notice')(b.noticeFiles||[],'notice')}${rows(null,'task')(b.taskFiles||[],'task')}<div class="upload-row"><button class="upload-btn upload-btn-notice" onclick="triggerUp(${b.id},'notice')">↑공고</button><button class="upload-btn upload-btn-task" onclick="triggerUp(${b.id},'task')">↑과업</button></div></div>`;
}

const EC='edit-cell', EI='<span class="edit-icon">✏</span>';
function renderTable(data){
  document.getElementById('tableBody').innerHTML=data.map(b=>`
  <tr>
    <td class="${EC}" onclick="ie(${b.id},'postDate',this,{})">${b.postDate}${EI}</td>
    <td class="${EC}" onclick="ie(${b.id},'date',this,{})">${b.date}${EI}</td>
    <td class="${EC}" onclick="ie(${b.id},'openDate',this,{w:true})">${b.openDate}${EI}</td>
    <td class="${EC}" onclick="ie(${b.id},'rank',this,{})">${b.rank}${EI}</td>
    <td class="${EC}" style="font-weight:700" onclick="ie(${b.id},'client',this,{w:true})">${b.client}${EI}</td>
    <td class="${EC}" style="font-size:13px;font-weight:600;color:#0f172a" onclick="ie(${b.id},'title',this,{w:true})">${b.title}${EI}</td>
    <td class="${EC}" style="font-weight:800" onclick="ie(${b.id},'amount',this,{n:true})">${b.amount.toLocaleString()}${EI}</td>
    <td class="${EC}" onclick="ie(${b.id},'result',this,{sel:true})"><span class="badge ${getBadge(b.result)}">${normalRes(b.result)}</span>${EI}</td>
    <td class="${EC}" onclick="ie(${b.id},'winner',this,{})">${b.winner}${EI}</td>
    <td class="${EC}" onclick="ie(${b.id},'partners',this,{w:true})">${renderPartners(b.partners)}${EI}</td>
    <td>${renderFilePanel(b)}</td>
    <td style="text-align:center"><button class="btn-del" onclick="delBid(${b.id})">삭제</button></td>
  </tr>`).join('');
}

// Inline edit
function ie(id,field,td,opts){
  if(td.querySelector('input,select')) return;
  const b=bids.find(x=>x.id===id);if(!b) return;
  const val=b[field]!==undefined?b[field]:'';
  let el;
  if(opts.sel){
    el=document.createElement('select');el.className='inline-input';
    ['진행중','낙찰','당사낙찰','타사낙찰','불참'].forEach(o=>{
      const op=document.createElement('option');op.value=o==='진행중'?'-':o;op.textContent=o;
      if((val==='-'&&o==='진행중')||val===o) op.selected=true;
      el.appendChild(op);
    });
    el.addEventListener('change',async()=>{b[field]=el.value;await saveAll(bids);renderAll();});
  } else {
    el=document.createElement('input');el.type=opts.n?'number':'text';el.value=val;
    el.className='inline-input';el.style.width=opts.w?'160px':'90px';
    const save=async()=>{b[field]=opts.n?Number(el.value):el.value.trim();await saveAll(bids);renderAll();};
    el.addEventListener('keydown',e=>{if(e.key==='Enter')save();if(e.key==='Escape')renderAll();});
    const sw=document.createElement('button');sw.className='btn-save-sm';sw.textContent='✓';sw.onclick=save;
    const cx=document.createElement('button');cx.className='btn-cancel-sm';cx.textContent='✕';cx.onclick=()=>renderAll();
    td.innerHTML='';
    const wrap=document.createElement('div');wrap.style.display='flex';wrap.style.gap='4px';wrap.style.alignItems='center';
    wrap.append(el,sw,cx);td.appendChild(wrap);el.focus();if(el.select)el.select();return;
  }
  td.innerHTML='';td.appendChild(el);el.focus();
}

// File ops
function dlFile(bid,type,idx){const b=bids.find(x=>x.id===bid);if(!b)return;const f=(type==='notice'?b.noticeFiles:b.taskFiles)[idx];if(!f)return;const url=getFileUrl(f);if(url){const a=document.createElement('a');a.href=url;a.download=getFileName(f);a.click();}else alert('파일을 찾을 수 없습니다.');}
async function rmFile(bid,type,idx){const b=bids.find(x=>x.id===bid);if(!b)return;const arr=type==='notice'?b.noticeFiles:b.taskFiles;arr.splice(idx,1);await saveAll(bids);renderAll();}
function triggerUp(bid,type){const inp=document.createElement('input');inp.type='file';inp.multiple=true;inp.accept='.pdf,.hwp,.hwpx,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png';inp.onchange=async()=>{const files=Array.from(inp.files);if(!files.length)return;const b=bids.find(x=>x.id===bid);if(!b)return;showBanner('⏫ 업로드 중...','#1d4ed8');for(const file of files){const fo=await uploadFile(bid,type,file);if(type==='notice')b.noticeFiles=[...(b.noticeFiles||[]),fo];else b.taskFiles=[...(b.taskFiles||[]),fo];}await saveAll(bids);renderAll();};inp.click();}

async function delBid(id){if(confirm('이 항목을 삭제하시겠습니까?')){bids=bids.filter(x=>x.id!==id);await saveAll(bids);renderAll();}}

// Modal
function openModal(id=null){
  modalFiles={notice:[],task:[]};pendingFiles={notice:[],task:[]};
  document.getElementById('modalOverlay').classList.add('open');
  if(id){
    const b=bids.find(x=>x.id===id);
    document.getElementById('modalTitle').textContent='입찰 정보 수정';
    document.getElementById('mId').value=b.id;
    document.getElementById('mPostDate').value=b.postDate;
    document.getElementById('mDate').value=b.date;
    document.getElementById('mOpenDate').value=b.openDate;
    document.getElementById('mRank').value=b.rank;
    document.getElementById('mClient').value=b.client;
    document.getElementById('mTitle').value=b.title;
    document.getElementById('mAmount').value=b.amount;
    document.getElementById('mResult').value=b.result||'-';
    document.getElementById('mWinner').value=b.winner;
    document.getElementById('mPartners').value=b.partners;
    modalFiles.notice=[...(b.noticeFiles||[])];
    modalFiles.task=[...(b.taskFiles||[])];
  } else {
    document.getElementById('modalTitle').textContent='신규 입찰 등록';
    ['mId','mPostDate','mDate','mOpenDate','mRank','mClient','mTitle','mAmount','mWinner','mPartners'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('mResult').value='-';
  }
  renderModalFiles();
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function renderModalFiles(){
  ['notice','task'].forEach(type=>{
    const cont=document.getElementById(type==='notice'?'mNoticeFiles':'mTaskFiles');
    cont.innerHTML=modalFiles[type].map((f,i)=>`<div style="display:flex;align-items:center;gap:4px;font-size:10px;margin-bottom:2px"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${getFileName(f)}</span><button style="color:#ef4444;background:none;border:none;cursor:pointer" onclick="rmModalFile('${type}',${i})">✕</button></div>`).join('');
  });
}
function rmModalFile(type,i){modalFiles[type].splice(i,1);renderModalFiles();}
function handleModalFile(e,type){Array.from(e.target.files).forEach(f=>{pendingFiles[type].push(f);modalFiles[type].push({name:f.name,pending:true});});renderModalFiles();e.target.value='';}

async function submitForm(){
  const id=document.getElementById('mId').value;
  const bid=id?parseInt(id):Date.now();
  showBanner('⏫ 저장 중...','#1d4ed8');
  for(const type of['notice','task']){
    for(const file of pendingFiles[type]){
      const fo=await uploadFile(bid,type,file);
      const pi=modalFiles[type].findIndex(f=>f.pending&&f.name===file.name);
      if(pi>=0)modalFiles[type][pi]=fo;else modalFiles[type].push(fo);
    }
  }
  const entry={id:bid,postDate:document.getElementById('mPostDate').value,date:document.getElementById('mDate').value,openDate:document.getElementById('mOpenDate').value,rank:document.getElementById('mRank').value,client:document.getElementById('mClient').value,title:document.getElementById('mTitle').value,amount:parseInt(document.getElementById('mAmount').value)||0,result:document.getElementById('mResult').value,winner:document.getElementById('mWinner').value,partners:document.getElementById('mPartners').value,noticeFiles:modalFiles.notice.filter(f=>!f.pending),taskFiles:modalFiles.task.filter(f=>!f.pending)};
  if(id) bids[bids.findIndex(x=>x.id===parseInt(id))]=entry;
  else bids.unshift(entry);
  await saveAll(bids);renderAll();closeModal();
}
